  <header>

      <center>
        <font color="orange">havinash</font>
        <font color="green">bank</font>
      </center>
    </h1>
    <nav align="center">
      <a href="index.html">about</a> &nbsp;

    </nav>
  </header>
  <hr>
  <main>
    <form>
      <table border="1px" cellpadding="6px" cellspacing="0px" align="center">

        <h1 align="center">Open New Bank Account</h1>


        <tr>
          <td><label> Full Name </label></td>
          <td><input type="Text"></td>
        </tr>

        <tr>

          <td><label>Father Name </label></td>
          <td><input type="text"></td>

        </tr>


        <tr>
          <td><label> Email </label></td>
          <td><input type="email"></td>
        </tr>


        <tr>
          <td><label>Phone</label></td>
          <td><input type="tel"></td>

        </tr>

        <tr>
          <td><label> Date of birthday </label></td>
          <td><input type="date"></td>
        </tr>


        <tr>
          <td><label> Gender </label></td>
          <td>
            <input type="radio" value="MALE"> Male
            <input type="radio" value="FEMALE">Female
          </td>
        </tr>


        <tr>
          <td><label> Deposit </label></td>
          <td><input type="number"></td>
        </tr>


        <tr>
          <td><label>Account Type </label></td>
          <td>
            <select>
              <option value=" Select"> Select </option>
              <option value=" Saving"> Saving </option>
              <option value=" Current "> Current </option>
            </select>
          </td>
        </tr>


        <tr>
          <td><label> Aadhaar </label></td>
          <td><input type="file"></td>
        </tr>


        <tr>

          <td><label> Address </label></td>
          <td><textarea rows="3" cols="18"></textarea></td>

        </tr>


        <tr>
          <td align="center" colspan="2px">
            <input type="submit" value="apply">
            <input type="reset" value="reset">
          </td>
        </tr>
      </table>
    </form>
  </main>
  <br><br><br>
