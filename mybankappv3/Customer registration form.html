      <center>
        <font color="orange">havinash</font>
        <font color="green">bank</font>
      </center>
    </h1>
    <nav align="center">

    </nav>

  <hr>
  <main>
    <form>
      <center>
        <h1> Customer registration form</h1>
      </center>
      <table align="center" border="1px" cellpadding="6px" cellspacing="0px">




        <tr>
          <td><label> Customer Name </label></td>
          <td><input type="Text"></td>
        </tr>


        <tr>
          <td><label>Password </label></td>
          <td><input type="password"></td>
        </tr>


        <tr>
          <td><label> Confirm Password </label></td>
          <td><input type="password"></td>
        </tr>



        <tr>
          <td><label> Email </label></td>
          <td>
            <input type="email">

          </td>

        </tr>
        <tr>
          <td><label>Mobile</label></td>
          <td><input type="tel"></td>

        </tr>

        <tr>
          <td>
            <label> Date of birthday </label>
          </td>
          <td><input type="date"></td>
        </tr>


        <tr>
          <td><label> Gender </label></td>
          <td>
            <input type="radio" value="MALE"> Male
            <input type="radio" value="FEMALE">Female
          </td>
        </tr>



        <tr>
          <td><label>Account Type </label></td>
          <td>
            <select>
              <option value=" Select"> Select </option>
              <option value=" Saving"> Saving </option>
              <option value=" Current "> Current </option>
            </select>
          </td>
        </tr>


        <tr>
          <td><label> Aadhaar number </label></td>
          <td><input type="number"></td>
        </tr>



        <tr>
          <td><label>PAN Upload</label></td>
          <td><input type="file"></td>
        </tr>



        <tr>
          <td><label> Address </label></td>
          <td><textarea rows="3" cols="18"></textarea></td>
        </tr>


        <tr>
          <td><label> Terms </label></td>
          <td>

            <input type="checkbox" value="agree"> I Agree
          </td>
        </tr>




        <tr>

          <td colspan="2px" align="center">
            <input type="submit" value="apply">
            <input type="reset" value="reset">
          </td>

        </tr>


      </table>
    </form>

  </main>

  <hr>
