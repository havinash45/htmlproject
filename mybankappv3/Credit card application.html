  <main>
    <form>
      <table align="center" border="1px" cellpadding="6px" cellspacing="0px">

        <h1 align="center"> Credit card application </h1>


        <tr>
          <td><label>Name </label></td>
          <td><input type="Text"></td>
        </tr>



        <tr>
          <td><label> Email </label></td>
          <td><input type="email"></td>
        </tr>


        <tr>
          <td><label>phone</label></td>
          <td><input type="tel"></td>
        </tr>

        <tr>

          <td><label> Salary</label></td>
          <td><input type="number"></td>
        </tr>


        <tr>
          <td><label> Employment </label></td>
          <td>
            <input type="radio" value="Private">Private
            <input type="radio" value="government">Government
          </td>
        </tr>


        <tr>
          <td><label>company website</label></td>
          <td><input type="url"></td>
        </tr>


        <tr>
          <td><label> resume</label></td>
          <td><input type="file"></td>
        </tr>


        <tr>
          <td><label> Address </label></td>
          <td><textarea rows="3" cols="18"></textarea></td>
        </tr>

        <tr>
          <td><label>card type </label></td>
          <td>
            <select>
              <option value="silver">silver</option>
              <option value="gold">gold</option>
            </select>
          </td>
        </tr>


        <tr>
          <td colspan="2px" align="center">
            <input type="submit" value="apply">
            <input type="reset" value="reset">
          </td>
        </tr>

      </table>
    </form>
