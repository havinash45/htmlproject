  <main>
    <form action="customer profile update" method="get" name="customers">
      <table border="1px" cellspacing="0px" cellpadding="6px" align="center">

        <h1 align="center"> Customer Profile Update</h1>


        <tr>
          <td><label for="id1">Name </label ></td>
          <td><input type="Text"  id="id1" name="Name"></td>
        </tr>




        <tr>
          <td><label for="id2"> Email </label></td>
          <td><input type="email"  id="id2" name="Email"></td>
        </tr>


        <tr>
          <td><label for="id3">Mobile</label ></td>
          <td><input type="tel"  id="id3" name="Mobile"></td>
        </tr>


        <tr>
          <td><label for="id4">website</label></td>
          <td><input type="url"  id="id4" name="website"></td>
        </tr>

        <tr>

          <td><label>Profile picture</label></td>
          <td><input type="file"  id="id5" name="profile picture"></td>
        </tr>



        <tr>
          <td><label for="id6">Account Type </label></td>
          <td>
            <select  id="id6" name="Account type">
              <option value=" Hyderabad"> Hyderabad </option>
              <option value=" vijayawada">vijayawada </option>
              <option value="machilipatnam">machilipatnam </option>
            </select>
          </td>
        </tr>


        <tr>
          <td><label for="id7"> Date of birthday </label></td>
          <td><input type="date"  id="id7" name="date"></td>
        </tr>




        <tr>
          <td><label for="id8" > Address </label ></td>
          <td><textarea rows="3" cols="18"  id="id8" name="Address"></textarea></td>
        </tr>



        <tr>
          <td colspan="2px" align="center"><input type="submit" value="apply"></td>
        </tr>


      </table>
