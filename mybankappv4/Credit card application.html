  <header>

      <center>
        <font color="orange">nash</font>
        <font color="green">bank</font>

    <nav align="center">

    </nav>

  <hr>
  <main>
    <form action="Credit card applicationurl" method="get" name="Credit" >
      <table align="center" border="1px" cellpadding="6px" cellspacing="0px">

        <h1 align="center"> Credit card application </h1>


        <tr>
          <td><label for="id1">Name </label></td>
          <td><input type="Text"  id="id1" name="Name"></td>
        </tr>



        <tr>
          <td><label for="id2"> Email </label></td>
          <td><input type="email"  id="id2" name="Email"></td>
        </tr>


        <tr>
          <td><label for="id3">phone</label></td>
          <td><input type="tel"  id="id3" name="phone"></td>
        </tr>

        <tr>

          <td><label for="id4"> Salary</label></td>
          <td><input type="number"  id="id4" name="Salary"></td>
        </tr>


        <tr>
          <td><label> Employment </label></td>
          <td>
            <input type="radio" value="Private"  id="id5" name="Employment">Private
            <input type="radio" value="government"  id="id6" name="Employment" >Government
          </td>
        </tr>


        <tr>
          <td><label for="id7">company website</label></td>
          <td><input type="url"  id="id7" name="companyurl"></td>
        </tr>


        <tr>
          <td><label > resume</label></td>
          <td><input type="file"  id="id8" name="resume"></td>
        </tr>


        <tr>
          <td><label for="id9"> Address </label></td>
          <td><textarea rows="3" cols="18"  id="id9" name="Address"></textarea></td>
        </tr>

        <tr>
          <td><label for="id10">card type </label></td>
          <td>
            <select  id="id10" name="card type">
              <option value="silver">silver</option>
              <option value="gold">gold</option>
            </select>
          </td>
        </tr>


        <tr>
          <td colspan="2px" align="center">
            <input type="submit" value="apply">
            <input type="reset" value="reset">
          </td>
        </tr>

      </table>
    </form>

  </main>
