    </nav>

  <hr>
  <main>
    <form action="Customer registration form" method="get" name="customer">
      <center>
        <h1> Customer registration form</h1>
      </center>
      <table align="center" border="1px" cellpadding="6px" cellspacing="0px">




        <tr>
          <td><label for="id1"> Customer Name </label></td>
          <td><input type="Text" id="id1" name="Customername"></td>
        </tr>


        <tr>
          <td><label for="id2">Password </label></td>
          <td><input type="password" id="id2" name="password"></td>
        </tr>


        <tr>
          <td><label for="id3"> Confirm Password </label></td>
          <td><input type="password" id="id3" name="Confirm"></td>
        </tr>



        <tr>
          <td><label for="id4"> Email </label ></td>
          <td>
            <input type="email" id="id4" name="email">

          </td>

        </tr>
        <tr>
          <td><label for="id5">Mobile</label></td>
          <td><input type="tel" id="id5" name="Mobile"></td>

        </tr>

        <tr>
          <td>
            <label for="id6"> Date of birthday </label>
          </td>
          <td><input type="date" id="id6" name="date"></td>
        </tr>


        <tr>
          <td><label  > Gender </label></td>
          <td>
            <input type="radio" value="MALE" id="id7" name="Gender"> Male
            <input type="radio" value="FEMALE" id="id8" name="Gender">Female
          </td>
        </tr>



        <tr>
          <td><label for ="id9">Account Type </label></td>
          <td>
            <select id="id9" name="Account type">
              <option value=" Select"> Select </option>
              <option value=" Saving"> Saving </option>
              <option value=" Current "> Current </option>
            </select>
          </td>
        </tr>


        <tr>
          <td><label for="id10"> Aadhaar number </label></td>
          <td><input type="number" id="id10" name="Aadhaar"></td>
        </tr>



        <tr>
          <td><label>PAN Upload</label></td>
          <td><input type="file" id="id11" name="PAN"></td>
        </tr>



        <tr>
          <td><label for="id12"> Address </label></td>
          <td><textarea rows="3" cols="18" id="id12" name="Address"></textarea></td>
        </tr>


        <tr>
          <td><label > Terms </label></td>
          <td>

            <input type="checkbox" value="agree" id="id13" name="Terms"> I Agree
          </td>
        </tr>




        <tr>

          <td colspan="2px" align="center">
            <input type="submit" value="apply">
            <input type="reset" value="reset">
          </td>

        </tr>


      </table>
    </form>

  </main>

  <hr>
