<body>
  <header>
    <h1>
      <center>
        <font color="orange">havinash</font>
        <font color="green">bank</font>
      </center>
    </h1>
    <nav align="center">
      <a href="index.html">about</a> &nbsp;
      <a href="loans.html" target="_blank">loans</a>&nbsp;

      <a href="#" >Open New Bank Account</a>
    </nav>
  </header>
  <hr>
  <main>
    <form action="openurl" method="get" name="open">
      <table border="1px" cellpadding="6px" cellspacing="0px" align="center">

        <h1 align="center">Open New Bank Account</h1>


        <tr>
          <td><label for="99"> Full Name </label></td>
          <td><input type="Text" id="99" name="Name"></td>
        </tr>

        <tr>

          <td><label for="09">Father Name </label></td>
          <td><input type="text" id="09" name="Father name"></td>

        </tr>


        <tr>
          <td><label for="id65"> Email </label></td>
          <td><input type="email" id="id65" name="email"></td>
        </tr>


        <tr>
          <td><label for="id14">Phone</label></td>
          <td><input type="tel" id="id14" name="phone"></td>

        </tr>

        <tr>
          <td><label for="id13"> Date of birthday </label></td>
          <td><input type="date" id="id13" name="dob"></td>
        </tr>


        <tr>
          <td><label> Gender </label></td>
          <td>
            <input type="radio" value="MALE" id="3" name="man"> Male
            <input type="radio" value="FEMALE"id="4"  name="man">Female
          </td>
        </tr>


        <tr>
          <td><label for="id11"> Deposit </label></td>
          <td><input type="number" id="id11" name="Deposit"></td>
        </tr>


        <tr>
          <td><label for="id10">Account Type </label></td>
          <td>
            <select id="id10" name="Account type">
              <option value=" Select"> Select </option>
              <option value=" Saving"> Saving </option>
              <option value=" Current "> Current </option>
            </select>
          </td>
        </tr>


        <tr>
          <td><label > Aadhaar </label></td>
          <td><input type="file" id="id1" name="Aadhaar"></td>
        </tr>


        <tr>

          <td><label for="id2"> Address </label></td>
          <td><textarea rows="3" cols="18" id="id2" name="Address"></textarea></td>

        </tr>


        <tr>
          <td align="center" colspan="2px">
            <input type="submit" value="apply">
            <input type="reset" value="reset">
          </td>
        </tr>
      </table>
    </form>
  </main>
